# markdownlint configuration
# https://github.com/DavidAnson/markdownlint/blob/main/doc/Rules.md

default: true

# Line length — relaxed for tables and code blocks
MD013:
  line_length: 120
  tables: false
  code_blocks: false
  headings: false

# Allow inline HTML (needed for page-break divs, badges, etc.)
MD033: false

# Allow duplicate headings in different sections
MD024:
  siblings_only: true

# First line doesn't have to be a top-level heading
MD041: false

# Allow trailing punctuation in headings (e.g., "What is S(t)?")
MD026:
  punctuation: ".,;:!"
