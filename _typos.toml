# typos configuration
# https://github.com/crate-ci/typos

[default.extend-words]
# Domain-specific terms that are not typos
"ks" = "ks"           # Kolmogorov-Smirnov
"KS" = "KS"
"kl" = "kl"           # Kullback-Leibler
"KL" = "KL"
"cff" = "cff"         # Citation File Format
"CBPE" = "CBPE"       # Confidence-Based Performance Estimation
"PSI" = "PSI"         # Population Stability Index
"psi" = "psi"
"OPA" = "OPA"         # Open Policy Agent
"Rego" = "Rego"       # OPA policy language
"CNP" = "CNP"         # Card Not Present
"AML" = "AML"         # Anti-Money Laundering

[files]
extend-exclude = [
    ".venv/",
    "*.egg-info/",
    ".mypy_cache/",
    ".pytest_cache/",
    "htmlcov/",
]
